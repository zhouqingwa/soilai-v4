<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Yellow sticky traps in a houseplant pot</title>
  <desc id="desc">A potted houseplant with yellow sticky traps catching small fungus gnats near the soil.</desc>
